    // ─── TENNIS POINT-BY-POINT (Native) ────────────────
    function mapPointLabel(h, a) {
      if (h == null || a == null) return;
      const el = document.getElementById('tennis-inline-points');
      if (!el) return;
      
      const hs = String(h).toUpperCase(), as = String(a).toUpperCase();
      // Literal points (15, 30, 40, A)
      const isPoints = v => ['15','30','40','A','AD'].includes(v);
      if (isPoints(hs) || isPoints(as)) {
        el.innerText = `${hs}-${as}`;
        return;
      }

      // Small integers (0, 1, 2, 3) mapped to tennis points
      const map = ['0','15','30','40'];
      const H = parseInt(h), A = parseInt(a);
      if (isNaN(H) || isNaN(A)) {
        el.innerText = `${hs}-${as}`;
        return;
      }
      
      if (H >= 3 && A >= 3) {
        if (H === A) el.innerText = '40-40';
        else if (H > A) el.innerText = 'A-40';
        else el.innerText = '40-A';
      } else {
        el.innerText = `${map[H] || H}-${map[A] || A}`;
      }
    }

    async function startTennisLiveSofa(sofaId) {
      if (tennisPbpTimer) clearInterval(tennisPbpTimer);
      const id = String(sofaId).replace('sofa_', '');
      
      const poll = async () => {
        try {
          // Use nocache to bypass edge caching for live PBP
          const res = await fetch(`${PW_API_URL}/tennis/pbp/${id}?nocache=1&_=${Date.now()}`);
          const d = await res.json();
          if (d.success && d.incidents) {
            // Incidents are chronological, so we want the LAST one that is a 'point'
            let latest = null;
            for (let i = d.incidents.length - 1; i >= 0; i--) {
              const it = d.incidents[i];
              if (it.incidentType === 'point' || it.homeScore !== undefined) {
                latest = it;
                break;
              }
            }
            if (latest) {
              const key = `${latest.homeScore}-${latest.awayScore}-${latest.id || ''}`;
              if (key === tennisPbpLastKey) return;
              tennisPbpLastKey = key;
              mapPointLabel(latest.homeScore, latest.awayScore);
            }
          }
        } catch(e) {}
      };
      
      await poll();
      tennisPbpTimer = setInterval(poll, 2000);
    }

    function applyPitchTheme(sport) {
      const tc = document.getElementById('tennis-court');
      const footballLayers = document.querySelectorAll('.gh,.gm,.yl,.flines,.flines-dot,.al,.ar,.gl-f,.gr-f,.pov');
      const gov = document.getElementById('gov-timeline');
      const sbEl = document.getElementById('scoreboard');

      if (sport === 'tennis') {
        if (sbEl) sbEl.classList.add('tennis');
        tc.classList.add('active');
        const sbx = document.getElementById('tennis-setsbox'); if (sbx) sbx.style.display = 'flex';
        footballLayers.forEach(el => el.style.display = 'none');
        // Limpia feed al entrar en tenis para no arrastrar banners anteriores
        feedItems.length = 0; renderFeed();
        // Tenis: sin etiqueta de SET aquí (para no afear el marcador de juegos)
        gov.innerHTML = `
  <div class="gl-row" data-v="+10"><span>+10</span><div class="line"></div></div>
  <div class="gl-row" data-v="+5"><span>+5</span><div class="line"></div></div>
  <div class="gl-row main" data-v="0"><span>0</span><div class="line"></div></div>
  <div class="gl-row" data-v="-5"><span>-5</span><div class="line"></div></div>
  <div class="gl-row" data-v="-10"><span>-10</span><div class="line"></div></div>
`;
      } else {
        if (sbEl) sbEl.classList.remove('tennis');
        tc.classList.remove('active');
        const sbx = document.getElementById('tennis-setsbox'); if (sbx) sbx.style.display = 'none';
        footballLayers.forEach(el => el.style.display = '');

        // Restore Dominance Index
        gov.innerHTML = `
                    <div class="gl-row" data-v="+10"><span>+10</span><div class="line"></div></div>
                    <div class="gl-row" data-v="+5"><span>+5</span><div class="line"></div></div>
                    <div class="gl-row main" data-v="0"><span>0</span><div class="line"></div></div>
                    <div class="gl-row" data-v="-5"><span>-5</span><div class="line"></div></div>
                    <div class="gl-row" data-v="-10"><span>-10</span><div class="line"></div></div>

    async function loadEvents(sport, btn) {
      const list = document.getElementById('ev-list');
      if (!list) return;

      const nonce = ++eventsLoadNonce;

      // Tabs
      if (btn) {
        btn.parentElement.querySelectorAll('.estab').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
      }

      list.innerHTML = `<p class="loading-txt">⏳ Buscando partidos...</p>`;

      // Fetch BOTH live and upcoming IN PARALLEL — always
      let liveEvents = [], upcomingEvents = [];
      try {
        [liveEvents, upcomingEvents] = await Promise.all([
          PW_live_events(sport).catch(() => []),
          PW_upcoming_events(sport).catch(() => [])
        ]);
      } catch (e) {
        console.warn('API Error', e);
      }

      // Limit upcoming to next 4 matches to not overflow UI
      upcomingEvents = (upcomingEvents || []).slice(0, 4);

      if (nonce !== eventsLoadNonce) return;

      // ─── DISPLAY-SIDE FILTER (safe — worker untouched) ────────────────────
      // Football: strict whitelist (La Liga, Premier, Champions) as requested
      const FOOTBALL_OK = ['la liga', 'laliga', 'premier league', 'champions league'];
      
      // Tennis: blocklist only (allow everything EXCEPT these junk categories)
      const TENNIS_BLOCKED = ['challenger', 'chall.', 'chall ', ' chall', 'itf', 'futures', ' double', 'doubles', 'junior', 'boys', 'girls'];

      function passesFilter(p) {
        const t = (p.tournament || p.comp || '').toLowerCase();
        if (p.sport === 'football') {
          const isLaLiga = t.includes('la liga') || t.includes('laliga') || (t.includes('spain') && t.includes('primera')) || (t.includes('españa') && t.includes('primera'));
          const isPremier = t.includes('premier league') && !t.includes('ireland') && !t.includes('wales') && !t.includes('scotland');
          const isChampions = t.includes('champions league') && !t.includes('women');
          
          if (!isLaLiga && !isPremier && !isChampions) return false;
          return true;
        }
        if (p.sport === 'tennis') {
          if (TENNIS_BLOCKED.some(kw => t.includes(kw))) return false;
        }

        // Final Time Guard: If match is marked Live but is > 24h old, or is Upcoming but > 12h away, filter out.
        if (p.kickoffMs) {
          const now = Date.now();
          const diff = p.kickoffMs - now;
          // Security: only matches started or starting in < 10min are LIVE
          if (p.isLive && diff > 10 * 60 * 1000) return false;
          // Window: only +/- 24h
          if (Math.abs(diff) > 24 * 60 * 60 * 1000) return false;
        }

        return true;
      }

      liveEvents = (liveEvents || []).filter(passesFilter);
      upcomingEvents = (upcomingEvents || []).filter(passesFilter);

      // ─── LIVE CARDS ───────────────────────────────────────────────────
      const liveHtml = (liveEvents || []).map(p => {
        const enc = encodeURIComponent(JSON.stringify(p));
        const scoreStr = (p.score && p.sport === 'football') ? ` ${p.score.home}-${p.score.away}` : '';
        return `
          <div class="evt-card" data-p="${enc}" onclick="selectEventFromP(this)" style="border-color:#4ade80;">
            <div class="meta" style="color:#4ade80;">${p.sport === 'tennis' ? '🎾' : '⚽'} ${p.comp || ''} · 🔴 EN VIVO${scoreStr}</div>
            <div class="teams">${p.home} vs ${p.away}</div>
            <div class="badge" style="background:#4ade80;color:#000;">▶ OPERAR EN VIVO</div>
          </div>`;
      }).join('');

      // ─── UPCOMING CARDS ───────────────────────────────────────────────
      const upcomingHtml = (upcomingEvents || []).map(p => {
        const enc = encodeURIComponent(JSON.stringify(p));
        const timeStr = p.kickoffMs ? new Date(p.kickoffMs).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
        const dateStr = p.kickoffMs ? new Date(p.kickoffMs).toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'}) : '';
        return `
          <div class="evt-card" data-p="${enc}" onclick="selectEventFromP(this)">
            <div class="meta">${p.sport === 'tennis' ? '🎾' : '⚽'} ${p.comp || ''} · 📅 ${dateStr} ${timeStr}</div>
            <div class="teams">${p.home} vs ${p.away}</div>
            <div class="badge" style="background:rgba(255,255,255,0.1);color:#fff;">▶ PRE-PARTIDO</div>
          </div>`;
      }).join('');

      // ─── UPCOMING SECTION HEADER ──────────────────────────────────────
      const upcomingSection = upcomingEvents.length > 0 ? `
        <div style="color:rgba(255,255,255,0.45); font-size:10px; font-weight:700; letter-spacing:1.5px; padding:8px 0 4px; text-transform:uppercase;">
          📅 Próximos partidos
        </div>
        ${upcomingHtml}` : '';

      // ─── VIRTUAL TESTS (always at bottom) ─────────────────────────────
      const testMatchHtml = `
        <div style="color:rgba(255,255,255,0.3); font-size:10px; font-weight:700; letter-spacing:1.5px; padding:8px 0 4px; text-transform:uppercase;">
          🔬 Simulación
        </div>
        <div class="evt-card" style="border-color:#FFD400; background:rgba(255,212,0,0.07);" onclick="selectEvent({home: 'Barcelona', away: 'Real Madrid', homeStrength: 0.8, idxBase: 5, sport: 'football'})">
          <div class="meta" style="color:#FFD400;">⚽ TEST VIRTUAL (FÚTBOL)</div>
          <div class="teams">Barcelona vs Real Madrid</div>
          <div class="badge">▶ PROBAR</div>
        </div>
        <div class="evt-card" style="border-color:#FFD400; background:rgba(255,212,0,0.07);" onclick="selectEvent({home: 'Alcaraz', away: 'Ruud', homeStrength: 0.85, idxBase: 5.5, sport: 'tennis'})">
          <div class="meta" style="color:#FFD400;">🎾 TEST VIRTUAL (TENIS)</div>
          <div class="teams">Alcaraz vs Ruud</div>
          <div class="badge">▶ PROBAR</div>
        </div>`;

      const noLiveMsg = liveEvents.length === 0
        ? `<p style="color:rgba(255,255,255,0.4); font-size:11px; text-align:center; padding:6px 0 10px;">⚠️ No hay partidos en directo ahora mismo.</p>` : '';

      list.innerHTML = `<div class="evt-list">${noLiveMsg}${liveHtml}${upcomingSection}${testMatchHtml}</div>`;
    }

      sim.freeze = false;

      sim.testMode = false;

      match.sport = s;

      document.querySelectorAll('#topbar .stab').forEach(b => b.classList.remove('on'));
      if (s === 'tennis') document.querySelectorAll('#topbar .stab')[1]?.classList.add('on');
      else document.querySelectorAll('#topbar .stab')[0]?.classList.add('on');

      // Kickoff
      try { data.kickoffMs = computeKickoffMs(data); } catch (e) { }

      if (data.isLive) {
        startPolling(data.eid);
        if (s === 'tennis') startTennisLiveSofa(data.sofaId || data.eid);
      }

      // Phase 2: Compute initial idxBase from homeStrength if no odds available
      // homeStrength 0.5 = even → idxBase 0; 0.75 = strong home → idxBase ~+3..+5
      if (typeof data.homeStrength !== 'number') data.homeStrength = 0.5;
      if (data.idxBase == null || !Number.isFinite(data.idxBase)) {
        const hs = clamp(data.homeStrength, 0.05, 0.95);
        const diff = hs - 0.5; // -0.45..+0.45
        // Map: diff=0 → 0, diff=0.25 → ~3.5, diff=0.45 → ~6.5
        data.idxBase = clamp(7 * Math.tanh(4 * diff), -7, 7);
      }

      // Hide overlay, init match, start animation
      const nm = document.getElementById('no-match'); if (nm) nm.style.display = 'none';
      initMatch(data);

      // For real matches: start polling immediately, for virtual tests: run local sim
      if (data.eid && data.isLive) {
        // Real live match — start polling for score updates
        startPolling(data.eid);
      } else if (!data.idEvent && !data.lsEid && !data.eid) {
        // Virtual test match
        if (s === 'tennis') runTennisSim();
        else runFootballSim();
      }

      afId = requestAnimationFrame(frame);
      hm('m-events');

      // Background fetch for extra data (odds, form)
      fetchExtraMatchData(data, myNonce);
    }

    async function fetchExtraMatchData(data, myNonce) {
      let pHome = (typeof data.homeStrength === 'number') ? data.homeStrength : 0.5;
      let oddsApplied = false;
      let idxBase = data.idxBase || 0;

      try {
        // 1. Intentar ODDS (Suelo tardar ~1-2s)
        if (data.sport === 'football') {
          let odds = null;
          // Si tenemos eid (FlashLive o 1xBet), intentamos el proxy del worker
          if (data.eid) {
            try {
              const res = await fetch(`${PW_API_URL}/odds/${data.eid}?sport=${data.sport}`);
              const d = await res.json();
              if (d.success && Array.isArray(d.odds?.DATA)) {
                // FlashLive structure: DATA is array of markets. Type 1 is 1X2.
                const m1x2 = d.odds.DATA.find(m => m.BOOKMAKER_BETTING_TYPE === 1);
                if (m1x2 && Array.isArray(m1x2.ITEMS)) {
                    odds = {
                        oh: parseFloat(m1x2.ITEMS[0]?.ODD_OUTCOME_VALUE),
                        od: parseFloat(m1x2.ITEMS[1]?.ODD_OUTCOME_VALUE),
                        oa: parseFloat(m1x2.ITEMS[2]?.ODD_OUTCOME_VALUE)
                    };
                }
              }
            } catch (e) { console.warn("FlashLive Odds Error", e); }
          }
          
          if (!odds && data.idEvent) {
            odds = await fetchOddsForMatch({ home: data.home, away: data.away, leagueId: data.idLeague });
          }
          if (myNonce !== selectNonce) return; // Cancelado por una selección posterior

          if (odds && odds.oh && odds.oa) {
            const idxHome = oddsToIdx(odds.oh, odds.od, odds.oa);
            oddsApplied = true;
            pHome = clamp(0.5 + (idxHome / 12), 0.05, 0.95);
            idxBase = clamp(Math.abs(idxHome), 0, 7);
            
            const favKey = (Math.abs(idxHome) < 0.25) ? 'none' : (idxHome > 0 ? 'home' : 'away');
            match.display = match.display || { leftKey: 'away', rightKey: 'home', favKey: 'none', eps: 0.02 };
            match.display.favKey = favKey;
            setSides(favKey !== 'none' ? favKey : 'home');
            
            data.commence_time = odds.commence_time;
          }
        }

        // 2. Si es TENIS, intentar RANKINGS (NUEVO)
        if (data.sport === 'tennis' && !oddsApplied) {
           try {
             const res = await fetch(`${PW_API_URL}/tennis/rankings`);
             const d = await res.json();
             if (d.success && (d.rankings.atp || d.rankings.wta)) {
               const allRanks = [...(d.rankings.atp || []), ...(d.rankings.wta || [])];
               const findRank = (name) => {
                 const n = normalizeName(name);
                 const entry = allRanks.find(r => normalizeName(r.full_name).includes(n) || n.includes(normalizeName(r.full_name)));
                 return entry ? parseInt(entry.rank) : null;
               };
               const rH = findRank(data.home);
               const rA = findRank(data.away);
               
               if (rH && rA) {
                  // Rank 1 vs 100 => diff = 99 (Home much stronger)
                  const diff = rA - rH; 
                  // Map rank diff to idxBase (e.g. diff 50 -> idx 3.5)
                  idxBase = clamp(diff / 15, -7, 7); 
                  pHome = clamp(0.5 + (idxBase / 12), 0.05, 0.95);
                  oddsApplied = true;
                  
                  const favKey = (Math.abs(idxBase) < 0.25) ? 'none' : (idxBase > 0 ? 'home' : 'away');
                  match.display = match.display || { leftKey: 'away', rightKey: 'home', favKey: 'none', eps: 0.02 };
                  match.display.favKey = favKey;
                  setSides(favKey !== 'none' ? favKey : 'home');
                  console.log(`[Rankings] Fixed: ${data.home}(#${rH}) vs ${data.away}(#${rA}) -> IdxBase=${idxBase.toFixed(1)}`);
               }
             }
           } catch(e) { console.warn("Tennis Rankings Error", e); }
        }

        // 3. Si no hay ODDS (ni rankings en tenis), intentar FORMA (SPORTSDB - tarda ~1-2s)
        if (!oddsApplied && data.idHomeTeam && data.idAwayTeam) {
          pHome = await estimateHomeStrengthFromForm(data.idHomeTeam, data.idAwayTeam);
          if (myNonce !== selectNonce) return;
          
          pHome = clamp(pHome, 0.05, 0.95);
          const favKey = decideFavKey(pHome, match.display?.eps ?? 0.02);
          match.display = match.display || { leftKey: 'away', rightKey: 'home', favKey: 'none', eps: 0.02 };
          match.display.favKey = favKey;
          setSides(favKey !== 'none' ? favKey : 'home');

          const rK = match.display.rightKey || 'home';
          const pRight = (rK === 'home') ? pHome : (1 - pHome);
          idxBase = probDiffToIdx(Math.abs(2 * pRight - 1));
        }

        // 4. Aplicar refinamientos al match activo
        if (myNonce === selectNonce) {
          match.homeStrength = pHome;
          match.idxBase = idxBase;
          renderLabels();
          renderScoreboard(match.homeScore, match.awayScore);
          
          // Si el partido está en pre-kick, re-congelamos con el nuevo idxBase
          if (sim.freeze) {
             sim.freezeIdx = clamp(idxBase, -10, 10);
             sim.idx = sim.freezeIdx;
             sim.targetIdx = sim.idx;
          }
          
          console.log(`[Background] Datos actualizados: Strength=${pHome.toFixed(2)}, IdxBase=${idxBase.toFixed(1)}`);
        }
      } catch (e) {
        console.warn('[Background] Error cargando datos extra:', e);
      }
    }

    // ── ZOOM (ventana alrededor de la bola) ───────────────────────────
    let zoomOn = false;
    let VIEW_RANGE = 10; // Fijo para ambos deportes (diez arriba, diez abajo)
    let ZOOM_RANGE = 1.5; // Zoom estricto más acercado
    const BALL_R = 9; // radio del círculo principal

    // Desplazamiento vertical (look-ahead) en ZOOM: evita que la bola quede siempre centrada
    // y la coloca más arriba si el índice es positivo, más abajo si es negativo.
    let ZOOM_LEAD_K = 0.20;   // cuánto bascula por punto de índice (suavizado a 0.20 para flotar más)
    let ZOOM_LEAD_MAX = 0.85; // % del rango máximo permitido para no pegarse al borde

    let zoomCenter = 0;     // centro de cámara (suavizado)
    let zoomCenterUI = 0;   // centro de la leyenda (seguirá al centro de vista)

    // Cámara (para mantener bola y background sincronizados en ZOOM)
    let camS = 1;
    let camPanX = 0;
    let camPanY = 0;
    let camViewCenter = 0;
    function renderAxisLabels() {
      const gov = document.getElementById('gov-timeline');
      if (!gov) return;

      if (!zoomOn) {
        gov.innerHTML = `
      <div class="gl-row" data-v="+10"><span>+10</span><div class="line"></div></div>
      <div class="gl-row" data-v="+5"><span>+5</span><div class="line"></div></div>
      <div class="gl-row main" data-v="0"><span>0</span><div class="line"></div></div>
      <div class="gl-row" data-v="-5"><span>-5</span><div class="line"></div></div>
      <div class="gl-row" data-v="-10"><span>-10</span><div class="line"></div></div>
    `;
        return;
      }

      const r = ZOOM_RANGE;
      const c = zoomCenterUI;
      const fmt = (v) => {
        const s = (v > 0 ? '+' : (v < 0 ? '' : ''));
        return s + v.toFixed(1);
      };

      gov.innerHTML = `
    <div class="gl-row" data-v="t"><span>${fmt(c + r)}</span><div class="line"></div></div>
    <div class="gl-row" data-v="m"><span>${fmt(c + r / 2)}</span><div class="line"></div></div>
    <div class="gl-row main" data-v="c"><span>${fmt(c)}</span><div class="line"></div></div>
    <div class="gl-row" data-v="m2"><span>${fmt(c - r / 2)}</span><div class="line"></div></div>
    <div class="gl-row" data-v="b"><span>${fmt(c - r)}</span><div class="line"></div></div>
  `;
    }

    function applyBackgroundZoom() {
      const pv = document.getElementById('pitch-visual');
      const pitch = document.getElementById('pitch');
      if (!pv || !pitch) return;

      if (!zoomOn) {
        pv.style.transformOrigin = '50% 50%';
        pv.style.transform = '';
        camS = 1; camPanX = 0; camPanY = 0; camViewCenter = 0;
        return;
      }

      // Zoom + parallax X (avance) + basculación Y.
      // Nota: en CSS las funciones se aplican right-to-left, así que scale() ocurre antes y translate() después.
      // Resultado: la traslación está en px de pantalla (no se escala).
      const W = pitch.clientWidth || 1;
      const H = pitch.clientHeight || 1;
      const cx = W / 2, cy = H / 2;

      // Escala EXACTA del zoom para que coincida matemáticamente con las etiquetas de gov-timeline.
      // Si el VIEW_RANGE es 10 y el ZOOM_RANGE es 2, el zoom DEBE ser 5.0 (sin clamp arbitrario).
      camS = VIEW_RANGE / Math.max(0.01, ZOOM_RANGE);

      // Progreso horizontal (0..1) basado en X actual
      const prog = clamp(((sim.x ?? 0) / W), 0, 1);
      const panRangeX = (camS - 1) * W;
      // Compensa el centrado del scale(): inicio:+pan/2, final:-pan/2
      camPanX = (0.5 - prog) * panRangeX;

      // Centro de vista vertical: sigue el índice con suavizado MUCHO más lento ("flotante")
      zoomCenter += (sim.idx - zoomCenter) * 0.04;

      camViewCenter = zoomCenter; // La bola queda siempre exactamente en el centro Y de la pantalla.

      // Convertimos el centro de vista (en unidades de índice) a coordenada mundo (px)
      const worldCenterY = ((VIEW_RANGE - camViewCenter) / (2 * VIEW_RANGE)) * H;
      const panRangeY = (camS - 1) * H;
      const panYraw = (cy - worldCenterY) * camS;
      camPanY = clamp(panYraw, -panRangeY / 2, panRangeY / 2);

      pv.style.transformOrigin = '50% 50%';
      pv.style.transform = `translate(${camPanX.toFixed(1)}px, ${camPanY.toFixed(1)}px) scale(${camS.toFixed(3)})`;
    }

    function toggleZoom() {
      zoomOn = !zoomOn;

    function hm(id) { document.getElementById(id).classList.add('h'); }

    // ── EMPTY STATE & AUTO LOAD ──
    function setNoMatchState(sport, nextTime) {
      document.getElementById('team-home').innerText = 'NO HAY PARTIDOS';
      document.getElementById('team-away').innerText = 'EN DIRECTO';
      document.getElementById('live-score').innerText = '-';
      document.getElementById('match-time').innerText = nextTime ? `Próximo: ${nextTime}` : (sport === 'tennis' ? 'Buscando tenis...' : 'Buscando fútbol...');
      document.getElementById('tennis-inline-points').style.display = (sport === 'tennis') ? 'block' : 'none';
      document.getElementById('lbl-home').innerText = sport === 'tennis' ? 'Jugador 1' : 'Visitante';
      document.getElementById('lbl-away').innerText = sport === 'tennis' ? 'Jugador 2' : 'Local';

      sim.active = true;
      sim.idx = 0;
      sim.targetIdx = 0;
      const iv = document.getElementById('idx');
      iv.innerText = 'ESPERANDO';
      iv.style.color = 'rgba(255,255,255,0.4)';
      iv.style.textShadow = 'none';

      // Center ball
      const pitch = document.getElementById('pitch');
      if (pitch) {
        const W = pitch.clientWidth, H = pitch.clientHeight;
        sim.x = W / 2;
        const yPos = H / 2;
        document.getElementById('ball').setAttribute('transform', `translate(${sim.x},${yPos})`);
        document.getElementById('trail').setAttribute('d', '');
      }
    }

    async function autoLoadMatch(sport) {
      setNoMatchState(sport);
      try {
        // Priority 1: Our High-Quality RapidAPI via Worker
        let live = await PW_live_events(sport);
        if (live && live.length > 0) {
          selectEvent(live[0]);
          return;
        }
        
        // Priority 2: Upcoming matches from our worker
        let upcoming = await PW_upcoming_events(sport);
        if (upcoming && upcoming.length > 0) {
          selectEvent(upcoming[0]);
          return;
        }

        // Fallback: TheSportsDB (Legacy)
        const today = new Date().toISOString().split('T')[0];
        const sportStr = sport === 'tennis' ? 'Tennis' : 'Soccer';
        let r = await fetch(`${SPORTSDB_BASE}/eventsday.php?d=${today}&s=${sportStr}`);
        let d = await r.json();
        let events = d.events || [];

        if (events.length > 0) {
          const liveEvent = events.find(e => {
            const st = (e.strStatus || '').toLowerCase();
            return st === 'in progress' || st === '1h' || st === '2h' || st === 'ht' || e.intElapsed > 0;
          });

          if (liveEvent) {
            selectEvent({
              home: liveEvent.strHomeTeam, away: liveEvent.strAwayTeam,
              homeStrength: 0.5,
              sport, idEvent: liveEvent.idEvent,
              idHomeTeam: liveEvent.idHomeTeam, idAwayTeam: liveEvent.idAwayTeam, idLeague: liveEvent.idLeague, season: liveEvent.strSeason
            });
            return;
          }
          
          const nowStr = new Date().toTimeString().slice(0, 5);
          const next = events.filter(e => (e.strTime || '').slice(0, 5) >= nowStr)
            .sort((a, b) => (a.strTime || '').localeCompare(b.strTime || ''));
          
          if (next.length > 0) {
            setNoMatchState(sport, (next[0].strTime || '').slice(0, 5));
          } else {
            setNoMatchState(sport, 'Mañana');
          }
        } else {
          setNoMatchState(sport, 'Sin eventos');
        }
      } catch (e) {
        setNoMatchState(sport, '---');
      }
    }


    // ─────────────────────────────────────────────────────────
    // ✅ FIX: enlaza botones por JS (por si el navegador/CSP ignora onclick inline)
    // Esto hace que los botones respondan SIEMPRE mientras el script esté cargado.
    // ─────────────────────────────────────────────────────────
    function bindUI() {
      try {
        const snd = document.getElementById('btn-snd');
        if (snd) snd.onclick = (e) => { e.preventDefault(); try { toggleSound(); } catch (_) { } };
        const zoom = document.getElementById('btn-zoom');
        if (zoom) zoom.onclick = (e) => { e.preventDefault(); try { toggleZoom(); } catch (_) { } };
        const plus = document.querySelector('.btn-plus');
        if (plus) plus.onclick = (e) => { e.preventDefault(); try { showEvents(); } catch (_) { } };
        const av = document.querySelector('.avatar');
        if (av) av.onclick = (e) => { e.preventDefault(); try { handleAvatarClick(); } catch (_) { } };

        // Tabs deporte
        const tabs = document.querySelectorAll('#topbar .stab');
        if (tabs && tabs.length >= 2) {
          tabs[0].onclick = (e) => { e.preventDefault(); try { switchSport('football', tabs[0]); } catch (_) { } };
          tabs[1].onclick = (e) => { e.preventDefault(); try { switchSport('tennis', tabs[1]); } catch (_) { } };
        }

        // Action bar
        const buy = document.querySelector('#abar .btn-b');
        if (buy) buy.onclick = (e) => { e.preventDefault(); try { openPos('BUY'); } catch (_) { } };
        const sell = document.querySelector('#abar .btn-s');
        if (sell) sell.onclick = (e) => { e.preventDefault(); try { openPos('SELL'); } catch (_) { } };
        const exit = document.getElementById('btn-exit');
        if (exit) exit.onclick = (e) => { e.preventDefault(); try { closePos(); } catch (_) { } };

        // Modal: cerrar tocando fondo ya está en onload, pero reforzamos
        document.querySelectorAll('.mback').forEach(el => {
          el.addEventListener('click', ev => { if (ev.target === el) el.classList.add('h'); });
        });

        // Indicador minúsculo de “JS OK” (debug)
        if (!document.getElementById('js-ok-dot')) {
          const d = document.createElement('div');
          d.id = 'js-ok-dot';
          d.style.cssText = 'position:fixed;left:6px;bottom:6px;width:8px;height:8px;border-radius:50%;background:#4ade80;opacity:.85;z-index:9999;';
          d.title = 'JS OK';
          document.body.appendChild(d);
        }
      } catch (e) { }
    }

    // ── INIT ───────────────────────────────────────────
    // Si el documento ya está cargado, enlaza UI inmediatamente
    try { if (document.readyState === 'interactive' || document.readyState === 'complete') bindUI(); } catch (e) { }

    window.onload = async () => {
      bindUI();
      applyPitchTheme('football');
      setNoMatchState('football');
      // Por defecto: próximo partido de fútbol (EPL/LaLiga). Sin banner al abrir.
      autoPickDefaultFootball().then(ok => { if (!ok) autoLoadMatch('football'); });
      document.querySelectorAll('.mback').forEach(el => {
        el.addEventListener('click', e => { if (e.target === el) el.classList.add('h'); });
      });
      // Kick animation loop
      sim.active = true;
      if (afId) cancelAnimationFrame(afId);
      afId = requestAnimationFrame(frame);
    };


    try {
      window.switchSport = switchSport;
      window.showEvents = showEvents;
      window.handleAvatarClick = handleAvatarClick;
      window.loadEvents = loadEvents;
      window.selectEvent = selectEvent;
      window.selectEventFromP = selectEventFromP;
      window.toggleSound = toggleSound;
      window.toggleZoom = toggleZoom;
      window.openPos = openPos;
      window.closePos = closePos;
      window.hm = hm;
    } catch (e) { }


    // MOBILE_AVATAR_FORCE_AUTH: fuerza apertura del login desde el avatar (móvil)
    (function () {
      function onAvatar(ev) {
        try {
          const t = ev.target;
          const av = t && t.closest ? t.closest('.avatar') : null;
          if (!av) return;
          ev.preventDefault();
          ev.stopPropagation();
          try {
            if (typeof user !== 'undefined' && user) showProfile();
            else showAuth('login');
          } catch (_) { }
        } catch (_) { }
      }
      document.addEventListener('pointerdown', onAvatar, true);
      document.addEventListener('touchstart', onAvatar, { capture: true, passive: false });
      document.addEventListener('click', onAvatar, true);
    })();

  </script>
</body>
